# ================================
# Rectoverso OS - Docker Compose
# Development & Production Configuration
# ================================

services:
  # ========================================
  # Development Services
  # ========================================
  dev:
    <<: *base-service
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: rectoverso-os-dev
    ports:
      - "3000:3000"
      - "3001:3001"  # Storybook
    environment:
      <<: *base-env
      NODE_ENV: development
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: pnpm dev
    profiles:
      - dev

  # ========================================
  # Production Services
  # ========================================
  app:
    <<: *base-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: rectoverso-os-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      <<: *base-env
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ========================================
  # Nginx Reverse Proxy
  # ========================================
  nginx:
    image: nginx:alpine
    container_name: rectoverso-os-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx-ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - nginx_ssl_certs:/etc/nginx/certs
    depends_on:
      - app
    profiles:
      - production
    networks:
      - rectoverso-network

  # ========================================
  # Database (PostgreSQL)
  # ========================================
  db:
    image: postgres:16-alpine
    container_name: rectoverso-os-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rectoverso_os
      POSTGRES_USER: rectoverso
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rectoverso_secret_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./supabase/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./docker/postgres.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rectoverso -d rectoverso_os"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rectoverso-network

  # ========================================
  # Redis (for caching & sessions)
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: rectoverso-os-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rectoverso-network

  # ========================================
  # PgAdmin (Database Management)
  # ========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rectoverso-os-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@rectoverso.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_password}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin-servers.json:/pgadmin4/servers.json:ro
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - dev
    networks:
      - rectoverso-network

  # ========================================
  # Watchtower (Auto-update containers)
  # ========================================
  watchtower:
    image: containrrr/watchtower:latest
    container_name: rectoverso-os-watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_NOTIFICATIONS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    profiles:
      - production
    networks:
      - rectoverso-network

# ========================================
# Networks
# ========================================
networks:
  rectoverso-network:
    driver: bridge
    name: rectoverso-os-network

# ========================================
# Volumes
# ========================================
volumes:
  postgres_data:
    name: rectoverso-os-postgres
  redis_data:
    name: rectoverso-os-redis
  pgadmin_data:
    name: rectoverso-os-pgadmin
  nginx_ssl_certs:
    name: rectoverso-os-ssl-certs

# ========================================
# YAML Anchors
# ========================================
x-base-service: &base-service
  build:
    context: .
    context: .
  user: "1000:1000"
  working_dir: /app
  networks:
    - rectoverso-network
  security_opt:
    - no-new-privileges:true
  read_only: false
  tmpfs:
    - /tmp:size=100M,mode=1777

x-base-env: &base-env
  # Supabase
  NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:5432}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
  # Database
  DATABASE_URL: postgresql://rectoverso:${DB_PASSWORD:-rectoverso_secret_password}@db:5432/rectoverso_os?schema=public
  # Redis
  REDIS_URL: redis://redis:6379
  # App
  NEXT_PUBLIC_APP_NAME: Rectoverso OS
  NODE_ENV: production
  # AI (Optional)
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  # Sentry
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
  # PostHog
  NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
  NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-}

# ========================================
# Named Profiles
# ========================================
# Usage:
#   Development: docker-compose --profile dev up
#   Production:  docker-compose --profile production up
# ========================================
