### File Upload

#### POST /api/upload

Upload a file.

**Request:** `multipart/form-data`
- `file` - The file to upload
- `bucket` - Storage bucket (optional, defaults to 'assets')
- `folder` - Folder path (optional)

**Response (201):**
```json
{
  "status": "success",
  "data": {
    "url": "https://storage.example.com/assets/uuid-filename.jpg",
    "filename": "uuid-filename.jpg",
    "size": 102400,
    "type": "image/jpeg"
  }
}
```

