### Campaigns

#### GET /api/campaigns

Get list of campaigns.

**Query Parameters:**
- `status` - Filter by status (can repeat for multiple)
- `health` - Filter by health status
- `type` - Filter by campaign type
- `client_id` - Filter by client
- `pic_id` - Filter by PIC
- `date_from` - Start date filter
- `date_to` - End date filter

**Response (200):**
```json
{
  "status": "success",
  "data": {
    "items": [
      {
        "id": "uuid",
        "name": "Tunaiku Lead Gen Q1",
        "type": "lead_generation",
        "status": "running",
        "health": "green",
        "client": {
          "id": "uuid",
          "name": "Tunaiku"
        },
        "pic": {
          "id": "uuid",
          "name": "Dewi Lestari"
        },
        "budget": 50000000,
        "start_date": "2024-01-01",
        "end_date": "2024-03-31"
      }
    ],
    "pagination": { ... }
  }
}
```

#### GET /api/campaigns/:id

Get campaign by ID with full details including checklists, tasks, and performance.

#### POST /api/campaigns

Create new campaign.

**Request:**
```json
{
  "client_id": "uuid",
  "name": "New Campaign",
  "type": "lead_generation",
  "status": "draft",
  "description": "Campaign description",
  "brief_url": "https://...",
  "objective": "Generate 1000 leads",
  "start_date": "2024-01-01T00:00:00Z",
  "end_date": "2024-03-31T00:00:00Z",
  "budget": 50000000,
  "pic_id": "uuid"
}
```

#### PATCH /api/campaigns/:id

Update campaign.

#### DELETE /api/campaigns/:id

Delete campaign.

#### GET /api/campaigns/:id/checklists

Get campaign checklists.

#### POST /api/campaigns/:id/checklists

Add checklist item.

#### PATCH /api/campaigns/:id/checklists/:checklistId

Update checklist item.

