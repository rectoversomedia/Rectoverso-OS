{
  "status": "success",
  "data": {
    "items": [
      {
        "id": "uuid",
        "title": "Setup tracking links",
        "description": "Create UTM tracking links",
        "status": "in_progress",
        "priority": "high",
        "due_date": "2024-01-15",
        "owner": {
          "id": "uuid",
          "name": "Ahmad Fauzi"
        },
        "campaign": {
          "id": "uuid",
          "name": "Tunaiku Q1"
        }
      }
    ],
    "pagination": { ... }
  }
}
```

#### GET /api/tasks/:id

Get task by ID.

#### POST /api/tasks

Create new task.

**Request:**
```json
{
  "title": "New Task",
  "description": "Task description",
  "status": "todo",
  "priority": "medium",
  "campaign_id": "uuid",
  "owner_id": "uuid",
  "due_date": "2024-01-15T00:00:00Z",
