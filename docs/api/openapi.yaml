### Users

#### GET /api/users

Get list of users (admin only).

**Query Parameters:**
- `role` - Filter by role
- `is_active` - Filter by active status

**Response (200):**
```json
{
  "status": "success",
  "data": {
    "items": [
      {
        "id": "uuid",
        "email": "user@example.com",
        "name": "John Doe",
        "role": "campaign_manager",
        "is_active": true,
        "last_login": "2024-01-01T00:00:00.000Z"
      }
    ],
    "pagination": { ... }
  }
}
```

#### GET /api/users/:id

Get user by ID.

#### POST /api/users

Create new user (admin only).

**Request:**
```json
{
  "email": "newuser@example.com",
  "name": "New User",
  "role": "intern",
  "department": "Marketing"
}
```

#### PATCH /api/users/:id

Update user.

#### DELETE /api/users/:id

Delete user (admin only).

