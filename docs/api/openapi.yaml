# Rectoverso OS - API Documentation

## Overview

The Rectoverso OS API follows RESTful principles and uses JSON for request/response bodies. All endpoints require authentication unless otherwise specified.

## Base URL

```
Production: https://api.rectoverso-os.com
Development: http://localhost:3000
```

## Authentication

The API uses Bearer token authentication. Include the token in the `Authorization` header:

```
Authorization: Bearer <your-token>
```

## Request Format

All requests should include the following headers:

```
Content-Type: application/json
Authorization: Bearer <token>
X-Request-ID: <optional-request-id>
```

## Response Format

All responses follow this structure:

### Success Response

```json
{
  "status": "success",
  "data": { ... },
  "meta": {
    "requestId": "uuid",
    "timestamp": "2024-01-01T00:00:00.000Z",
    "version": "1.0.0"
  }
}
```

### Error Response

```json
{
  "status": "error",
  "error": {
    "code": "ERROR_CODE",
    "message": "Human readable message",
    "details": {
      "field": ["validation error"]
    }
  },
  "meta": {
    "requestId": "uuid",
    "timestamp": "2024-01-01T00:00:00.000Z"
  }
}
```

## Pagination

List endpoints support pagination via query parameters:

| Parameter | Type | Default | Description |
|-----------|------|---------|-------------|
| page | integer | 1 | Page number |
| pageSize | integer | 20 | Items per page (max: 100) |
| sortBy | string | varies | Field to sort by |
| sortOrder | string | desc | Sort direction (asc/desc) |

Paginated responses include:

```json
{
  "data": {
    "items": [...],
    "pagination": {
      "page": 1,
      "pageSize": 20,
      "totalItems": 100,
      "totalPages": 5,
      "hasNextPage": true,
      "hasPreviousPage": false
    }
  }
}
```

## Error Codes

| Code | HTTP Status | Description |
|------|-------------|-------------|
| VALIDATION_ERROR | 422 | Request validation failed |
| UNAUTHORIZED | 401 | Authentication required |
| FORBIDDEN | 403 | Insufficient permissions |
| NOT_FOUND | 404 | Resource not found |
| CONFLICT | 409 | Resource already exists |
| RATE_LIMIT_EXCEEDED | 429 | Too many requests |
| INTERNAL_ERROR | 500 | Server error |

